name: SV_SET_FX
description: Modelo semántico del mercado de divisas SET-FX (SET-ICAP) - operaciones FX desnormalizadas con entidades, mercados y paridades. Datos sintéticos.
tables:
  - name: operaciones
    base_table:
      database: DB_HOL_SETICAP
      schema: PUBLIC
      table: OPERACIONES
    primary_key:
      columns: [ID]
    description: Operaciones de divisas negociadas o registradas en SET-FX (tabla desnormalizada)
    dimensions:
      - name: id
        expr: ID
        data_type: NUMBER
        unique: true
      - name: mercado_nombre
        expr: MERCADO_NOMBRE
        data_type: VARCHAR
        synonyms: [mercado, tipo de mercado, nombre del mercado]
        sample_values: ['Contado USD/COP', 'Forward USD/COP', 'Swap USD/COP', 'Next Day USD/COP']
      - name: paridad_nombre
        expr: PARIDAD_NOMBRE
        data_type: VARCHAR
        synonyms: [par, paridad, par de monedas, divisa]
        sample_values: ['USD/COP', 'EUR/COP', 'EUR/USD']
      - name: plazo_curva
        expr: PLAZO_CURVA
        data_type: VARCHAR
        synonyms: [plazo, tenor, curva, vencimiento]
        sample_values: ['T+0', 'T+1', 'T+2', '1M', '3M', '6M']
      - name: comprador_sigla
        expr: COMPRADOR_SIGLA
        data_type: VARCHAR
        synonyms: [sigla comprador, código comprador]
      - name: entidad_compradora
        expr: ENTIDAD_COMPRADORA
        data_type: NUMBER
        synonyms: [codigo entidad compradora, id entidad compradora, identificador del comprador]
        description: Código numérico de la entidad compradora. Enmascarado (999999) para roles no-admin por política de gobierno de datos.
      - name: comprador_nombre
        expr: COMPRADOR_NOMBRE
        data_type: VARCHAR
        synonyms: [comprador, entidad compradora, banco comprador, quien compra]
      - name: comprador_clase
        expr: COMPRADOR_CLASE
        data_type: VARCHAR
        synonyms: [tipo comprador, clase comprador, tipo de entidad compradora]
        sample_values: ['Banco', 'Comisionista', 'Corporación Financiera', 'Banco Central']
      - name: comprador_ciudad
        expr: COMPRADOR_CIUDAD
        data_type: VARCHAR
        synonyms: [ciudad comprador, plaza comprador]
      - name: vendedor_sigla
        expr: VENDEDOR_SIGLA
        data_type: VARCHAR
        synonyms: [sigla vendedor, código vendedor]
      - name: vendedor_clase
        expr: VENDEDOR_CLASE
        data_type: VARCHAR
        synonyms: [tipo vendedor, clase vendedor, tipo de entidad vendedora]
        sample_values: ['Banco', 'Comisionista', 'Corporación Financiera', 'Banco Central']
      - name: vendedor_nombre
        expr: VENDEDOR_NOMBRE
        data_type: VARCHAR
        synonyms: [vendedor, entidad vendedora, banco vendedor, quien vende]
      - name: submercado_nombre
        expr: SUBMERCADO_NOMBRE
        data_type: VARCHAR
        synonyms: [submercado, sub-mercado, segmento, interbancario]
      - name: comprador_comitente
        expr: COMPRADOR_COMITENTE
        data_type: VARCHAR
        synonyms: [comitente comprador, cliente final comprador, cliente del comprador]
      - name: comprador_comitente_sector
        expr: COMPRADOR_COMITENTE_SECTOR
        data_type: VARCHAR
        synonyms: [sector del comitente comprador, sector economico comprador]
      - name: anulada
        expr: ANULADA
        data_type: BOOLEAN
        synonyms: [anulada, cancelada, operación anulada]
        sample_values: ['true', 'false']
    time_dimensions:
      - name: fecha
        expr: FECHA
        data_type: DATE
        synonyms: [fecha, día de la operación, fecha negociación]
      - name: fecha_valor
        expr: FECHA_VALOR
        data_type: DATE
        synonyms: [fecha de liquidación, settlement, fecha valor]
    measures:
      - name: num_operaciones
        expr: COUNT(ID)
        data_type: NUMBER
        default_aggregation: count
        description: Número de operaciones
      - name: volumen_usd
        expr: SUM(MONTO_USD)
        data_type: NUMBER
        default_aggregation: sum
        description: Volumen total negociado en USD
      - name: volumen_cop
        expr: SUM(MONTO_COP)
        data_type: NUMBER
        default_aggregation: sum
        description: Volumen total en COP
      - name: trm_promedio
        expr: AVG(PRECIO)
        data_type: NUMBER
        default_aggregation: avg
        description: Tipo de cambio promedio (COP por USD)
      - name: vwap
        expr: SUM(PRECIO * MONTO_USD) / NULLIF(SUM(MONTO_USD), 0)
        data_type: NUMBER
        description: Precio promedio ponderado por volumen (VWAP)
      - name: monto_promedio_usd
        expr: AVG(MONTO_USD)
        data_type: NUMBER
        default_aggregation: avg
        description: Monto promedio por operación en USD

verified_queries:
  - name: vwap_usdcop_ultima_semana
    question: ¿Cuál fue el VWAP del USD/COP la última semana?
    sql: |
      SELECT ROUND(SUM(PRECIO * MONTO_USD) / NULLIF(SUM(MONTO_USD), 0), 2) AS vwap
      FROM DB_HOL_SETICAP.PUBLIC.OPERACIONES
      WHERE ANULADA = FALSE AND PARIDAD_NOMBRE = 'USD/COP'
        AND FECHA >= DATEADD(day, -7, (SELECT MAX(FECHA) FROM DB_HOL_SETICAP.PUBLIC.OPERACIONES))

  - name: entidad_mayor_volumen_mes
    question: ¿Qué entidad negoció el mayor volumen el último mes?
    sql: |
      SELECT COMPRADOR_NOMBRE, ROUND(SUM(MONTO_USD) / 1e6, 1) AS volumen_musd
      FROM DB_HOL_SETICAP.PUBLIC.OPERACIONES
      WHERE ANULADA = FALSE
        AND FECHA >= DATEADD(month, -1, (SELECT MAX(FECHA) FROM DB_HOL_SETICAP.PUBLIC.OPERACIONES))
      GROUP BY COMPRADOR_NOMBRE
      ORDER BY volumen_musd DESC
      LIMIT 1

  - name: volumen_por_plazo
    question: ¿Cuál es el volumen negociado por plazo (tenor)?
    sql: |
      SELECT PLAZO_CURVA, ROUND(SUM(MONTO_USD) / 1e6, 1) AS volumen_musd, COUNT(*) AS num_ops
      FROM DB_HOL_SETICAP.PUBLIC.OPERACIONES
      WHERE ANULADA = FALSE
      GROUP BY PLAZO_CURVA
      ORDER BY volumen_musd DESC

  - name: bancos_vs_comisionistas
    question: Compara el volumen negociado entre bancos y comisionistas
    sql: |
      SELECT COMPRADOR_CLASE, ROUND(SUM(MONTO_USD) / 1e6, 1) AS volumen_musd, COUNT(*) AS num_ops
      FROM DB_HOL_SETICAP.PUBLIC.OPERACIONES
      WHERE ANULADA = FALSE
      GROUP BY COMPRADOR_CLASE
      ORDER BY volumen_musd DESC

  - name: evolucion_trm_mensual
    question: ¿Cómo evolucionó la TRM promedio mes a mes?
    sql: |
      SELECT DATE_TRUNC('month', FECHA) AS mes, ROUND(AVG(PRECIO), 2) AS trm_promedio
      FROM DB_HOL_SETICAP.PUBLIC.OPERACIONES
      WHERE ANULADA = FALSE AND PARIDAD_NOMBRE = 'USD/COP'
      GROUP BY mes
      ORDER BY mes

  - name: operaciones_anuladas
    question: ¿Cuántas operaciones se anularon y qué porcentaje representan?
    sql: |
      SELECT COUNT_IF(ANULADA = TRUE) AS anuladas, COUNT(*) AS total,
             ROUND(100.0 * COUNT_IF(ANULADA = TRUE) / COUNT(*), 2) AS pct_anuladas
      FROM DB_HOL_SETICAP.PUBLIC.OPERACIONES
